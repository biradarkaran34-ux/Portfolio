<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration form</title>
    <Link rel="stylesheet" href="registration.css">
</head>
<body>
    <h1> registration form</h1>
    <label for="fullname">Full Name:</label>
    <input type="text" id="fullname" placeholder="Enter your full name"><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter your email"><br><br>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" placeholder="Enter your phone number"><br><br>

    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob"><br><br>

   
    <label>Gender:</label>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <input type="radio" name="gender" value="Other"> Other <br><br>

    
    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter password"required><br><br>

    <label for="confirm">Confirm Password:</label>
    <input type="password" id="confirm" placeholder="Re-enter password"required><br><br>

    
    <label for="skills">Skills:</label>
    <input type="text" id="skills" placeholder="Enter your skills"><br><br>

    
    <button type="submit">Register</button>
  </form>
</body>
</html>
